<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Prix de la pinte à Paris</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      background: #ECEAE5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 36px 24px;
    }

    /* ── Card ─────────────────────────────────────────────── */
    .card {
      background: #FFFFFF;
      border-radius: 28px;
      width: 940px;
      overflow: hidden;
      box-shadow: 0 28px 80px rgba(0,0,0,0.13), 0 0 0 1px rgba(0,0,0,0.04);
    }

    /* ── Header ───────────────────────────────────────────── */
    .header {
      padding: 36px 44px 0;
    }
    .eyebrow {
      font-size: 10.5px;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #F97316;
      margin-bottom: 10px;
    }
    .header h1 {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: -0.9px;
      color: #0C0C0C;
      line-height: 1.06;
    }
    .header p {
      font-size: 13px;
      color: #B8B5AE;
      margin-top: 8px;
      font-weight: 400;
    }

    /* ── Stats strip ──────────────────────────────────────── */
    .stats {
      display: flex;
      gap: 0;
      margin-top: 28px;
      border-top: 1px solid #F2F0EC;
    }
    .stat {
      flex: 1;
      padding: 20px 24px;
      border-right: 1px solid #F2F0EC;
    }
    .stat:last-child { border-right: none; }
    .stat-val {
      font-size: 28px;
      font-weight: 900;
      letter-spacing: -1px;
      line-height: 1;
    }
    .stat-lbl {
      font-size: 11.5px;
      color: #C0BDB7;
      margin-top: 5px;
      line-height: 1.35;
      font-weight: 500;
    }

    /* ── Map ──────────────────────────────────────────────── */
    #map {
      width: 100%;
      height: 520px;
    }
    .leaflet-container {
      background: #F5F3EF !important;
      font-family: inherit !important;
    }
    .leaflet-control-attribution { display: none !important; }

    /* ── Legend ───────────────────────────────────────────── */
    .legend-row {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 18px 44px 26px;
      border-top: 1px solid #F2F0EC;
    }
    .legend-end {
      font-size: 11.5px;
      font-weight: 700;
      color: #C0BDB7;
      white-space: nowrap;
    }
    .legend-bar {
      flex: 1;
      height: 9px;
      border-radius: 5px;
      overflow: hidden;
      display: flex;
    }
    .source-txt {
      font-size: 11px;
      color: #D0CEC9;
      white-space: nowrap;
      font-weight: 500;
    }

    /* ── Tooltip ──────────────────────────────────────────── */
    .leaflet-tooltip.tt {
      background: rgba(15,15,15,0.88);
      backdrop-filter: blur(8px);
      border: none;
      border-radius: 12px;
      padding: 0;
      box-shadow: 0 8px 28px rgba(0,0,0,0.25);
      font-family: inherit;
    }
    .leaflet-tooltip.tt::before { display: none; }
    .tt-inner { padding: 12px 16px; }
    .tt-name { font-size: 11.5px; font-weight: 600; color: rgba(255,255,255,0.5); margin-bottom: 3px; }
    .tt-price { font-size: 26px; font-weight: 900; color: #fff; letter-spacing: -0.5px; line-height: 1; }
    .tt-sub { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 4px; }
  </style>
</head>
<body>
<div class="card">

  <div class="header">
    <div class="eyebrow">Paris · Données 2025</div>
    <h1>Prix d'une pinte de bière<br>par arrondissement</h1>
    <p>4 142 bars avec prix renseigné · moyenne des bières pression</p>

    <div class="stats">
      <div class="stat">
        <div class="stat-val" style="color:#F97316">5,96 €</div>
        <div class="stat-lbl">Prix moyen<br>à Paris</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:#4ADE80">5,19 €</div>
        <div class="stat-lbl">20<small>e</small> · le moins cher</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:#F87171">7,97 €</div>
        <div class="stat-lbl">7<small>e</small> · le plus cher</div>
      </div>
      <div class="stat">
        <div class="stat-val" style="color:#A78BFA">+53%</div>
        <div class="stat-lbl">d'écart entre<br>les extrêmes</div>
      </div>
    </div>
  </div>

  <div id="map"></div>

  <div class="legend-row">
    <span class="legend-end">5,00 €</span>
    <div class="legend-bar" id="legendBar"></div>
    <span class="legend-end">8,00 €</span>
    <span class="source-txt">beerbar.fr</span>
  </div>

</div>

<script>
// ── Data ──────────────────────────────────────────────────────────────────────
const prices = {
  1:  { avg: 6.98, median: 7.00, bars: 29  },
  2:  { avg: 6.56, median: 6.50, bars: 15  },
  3:  { avg: 6.77, median: 6.90, bars: 15  },
  4:  { avg: 6.91, median: 7.00, bars: 28  },
  5:  { avg: 6.06, median: 6.00, bars: 37  },
  6:  { avg: 6.74, median: 6.50, bars: 32  },
  7:  { avg: 7.97, median: 8.20, bars: 11  },
  8:  { avg: 7.18, median: 7.00, bars: 19  },
  9:  { avg: 6.42, median: 6.20, bars: 25  },
  10: { avg: 6.13, median: 6.00, bars: 31  },
  11: { avg: 5.99, median: 6.00, bars: 50  },
  12: { avg: 5.91, median: 5.75, bars: 40  },
  13: { avg: 6.54, median: 7.00, bars: 22  },
  14: { avg: 7.03, median: 7.00, bars: 33  },
  15: { avg: 6.46, median: 6.00, bars: 62  },
  16: { avg: 6.93, median: 6.55, bars: 12  },
  17: { avg: 6.60, median: 6.50, bars: 26  },
  18: { avg: 5.56, median: 5.50, bars: 55  },
  19: { avg: 5.66, median: 5.50, bars: 56  },
  20: { avg: 5.19, median: 5.00, bars: 39  },
};

const MIN = 5.0, MAX = 8.0;

// Color scale: green-400 → yellow-400 → orange-400 → red-400
const STOPS = [
  [74, 222, 128],
  [250, 204,  21],
  [251, 146,  60],
  [248, 113, 113],
];

function getColor(avg) {
  const t = Math.max(0, Math.min(1, (avg - MIN) / (MAX - MIN)));
  const s = t * (STOPS.length - 1);
  const i = Math.min(Math.floor(s), STOPS.length - 2);
  const f = s - i;
  const [r1,g1,b1] = STOPS[i], [r2,g2,b2] = STOPS[i+1];
  return `rgb(${Math.round(r1+f*(r2-r1))},${Math.round(g1+f*(g2-g1))},${Math.round(b1+f*(b2-b1))})`;
}

// ── Legend ────────────────────────────────────────────────────────────────────
(function() {
  const bar = document.getElementById('legendBar');
  for (let i = 0; i < 60; i++) {
    const d = document.createElement('div');
    d.style.cssText = `flex:1;background:${getColor(MIN + (i/60)*(MAX-MIN))}`;
    bar.appendChild(d);
  }
})();

// ── Map — no tile layer (clean infographic look) ──────────────────────────────
const map = L.map('map', {
  zoomControl: false,
  scrollWheelZoom: false,
  attributionControl: false,
  dragging: false,
  doubleClickZoom: false,
  touchZoom: false,
}).setView([48.860, 2.338], 12);

// ── GeoJSON ────────────────────────────────────────────────────────────────────
fetch('https://opendata.paris.fr/api/explore/v2.1/catalog/datasets/arrondissements/exports/geojson?lang=fr')
  .then(r => r.json())
  .then(geojson => {
    function getNum(props) {
      const raw = props.c_ar ?? props.n_sq_ar ?? props.c_arinsee ?? props.arrondissement ?? '';
      const n = parseInt(String(raw));
      return n > 100 ? n - 75100 : n;
    }

    const layer = L.geoJSON(geojson, {
      style: f => {
        const num = getNum(f.properties);
        const d = prices[num];
        return {
          fillColor: d ? getColor(d.avg) : '#E0DDD8',
          fillOpacity: 0.92,
          color: '#FFFFFF',
          weight: 2.5,
        };
      },
      onEachFeature: (f, lyr) => {
        const num = getNum(f.properties);
        const d = prices[num];
        if (!d) return;
        const suf = num <= 1 ? 'er' : 'e';
        lyr.bindTooltip(`
          <div class="tt-inner">
            <div class="tt-name">${num}${suf} arrondissement</div>
            <div class="tt-price">${d.avg.toFixed(2)} €</div>
            <div class="tt-sub">${d.bars} bars · médiane ${d.median.toFixed(2)} €</div>
          </div>
        `, { sticky: true, opacity: 1, className: 'tt' });
        lyr.on('mouseover', () => lyr.setStyle({ fillOpacity: 1, weight: 3.5 }));
        lyr.on('mouseout',  () => lyr.setStyle({ fillOpacity: 0.92, weight: 2.5 }));
      }
    }).addTo(map);

    // ── Labels ─────────────────────────────────────────────────────────────────
    geojson.features.forEach(f => {
      const num = getNum(f.properties);
      const d = prices[num];
      if (!d) return;

      // Centroid
      let sLat = 0, sLng = 0, n = 0;
      const coords = f.geometry.type === 'Polygon'
        ? f.geometry.coordinates[0]
        : f.geometry.coordinates[0][0];
      coords.forEach(([lng, lat]) => { sLat += lat; sLng += lng; n++; });

      const suf = num <= 1 ? 'er' : 'e';
      L.marker([sLat/n, sLng/n], {
        icon: L.divIcon({
          className: '',
          html: `
            <div style="
              text-align:center;
              pointer-events:none;
              font-family:-apple-system,'Segoe UI','Helvetica Neue',sans-serif;
              line-height:1.15;
              text-shadow: 0 1px 0 rgba(255,255,255,0.35);
            ">
              <div style="font-size:10.5px;font-weight:800;color:rgba(0,0,0,0.55);letter-spacing:.01em">${num}${suf}</div>
              <div style="font-size:12px;font-weight:900;color:rgba(0,0,0,0.82);letter-spacing:-.2px">${d.avg.toFixed(2)}€</div>
            </div>`,
          iconSize: [52, 32],
          iconAnchor: [26, 16],
        }),
        interactive: false,
      }).addTo(map);
    });

    map.fitBounds(layer.getBounds(), { padding: [2, 2], maxZoom: 13 });
  })
  .catch(() => {
    document.getElementById('map').innerHTML =
      '<div style="display:flex;align-items:center;justify-content:center;height:100%;color:#bbb;font-size:14px">Carte non disponible hors ligne</div>';
  });
</script>
</body>
</html>
